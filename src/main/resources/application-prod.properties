server.port=${PORT:8080}
server.error.include-message=never
server.error.include-binding-errors=never

# CORS producción: solo tu dominio
spring.web.cors.allowed-origins=https://dawlugo.website,https://www.dawlugo.website
spring.web.cors.allowed-methods=GET,POST,OPTIONS
spring.web.cors.allowed-headers=Content-Type,Accept

# MySQL Ferozo (variables de entorno Railway)
spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false